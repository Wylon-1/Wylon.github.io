<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五温区功率电阻计算系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b35 50%, #f7931e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        .header-logo {
            height: 70px;
            width: auto;
            flex-shrink: 0;
            border-radius: 8px;
        }
        .header-text {
            flex: 1;
            text-align: center;
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { opacity: 0.9; font-size: 14px; }

        .progress-bar {
            display: flex;
            background: #f0f0f0;
            padding: 0;
        }
        .progress-step {
            flex: 1;
            text-align: center;
            padding: 15px 5px;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .progress-step.active {
            color: #e65100;
            border-bottom-color: #e65100;
            background: rgba(230,81,0,0.05);
        }
        .progress-step.completed {
            color: #28a745;
            border-bottom-color: #28a745;
        }

        .content { padding: 30px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .zone-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .zone-badge {
            background: linear-gradient(135deg, #ff8c00, #ff6b35);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .input-group {
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ff8c00;
            box-shadow: 0 0 0 3px rgba(255,140,0,0.15);
        }
        .input-group .unit {
            position: absolute;
            right: 15px;
            bottom: 12px;
            color: #999;
            font-size: 14px;
            font-weight: 600;
        }

        .results-panel {
            background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 100%);
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            border-left: 4px solid #ff8c00;
        }
        .results-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: #555; font-size: 14px; }
        .result-value {
            font-size: 18px;
            font-weight: 700;
            font-family: "Courier New", monospace;
        }
        .result-value.power { color: #e74c3c; }
        .result-value.resistance { color: #e74c3c; }
        .result-value.normal { color: #e65100; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff8c00, #ff6b35);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,53,0.5);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        /* Summary Page */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 16px;
        }
        .summary-table th {
            background: linear-gradient(135deg, #e65100, #ff8c00);
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: 600;
        }
        .summary-table td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .summary-table tr:nth-child(even) { background: #fff8f0; }
        .summary-table tr:hover { background: #ffe8d6; }
        .summary-table .zone-name {
            font-weight: 700;
            color: #e65100;
        }
        .summary-table .power-val {
            color: #e74c3c;
            font-weight: 700;
            font-family: "Courier New", monospace;
            font-size: 17px;
        }
        .summary-table .res-val {
            color: #e74c3c;
            font-weight: 700;
            font-family: "Courier New", monospace;
            font-size: 17px;
        }
        .total-row {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7) !important;
            font-weight: 700;
        }

        .formula-box {
            background: #fff8f0;
            border: 1px solid #ffd8b1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }
        .formula-box code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-family: "Courier New", monospace;
            color: #333;
        }

        @media print {
            body { background: white; }
            .container { box-shadow: none; max-width: 100%; }
            .btn-group, .progress-bar { display: none; }
        }
    </style>
</head>

AAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgCAxCAAAAAAAAAAAAAAAAILEIAAAAAAAAAAAAAAAAAgSgwAAAAAAAAAAAAAAACBIDAIAAAAAAAAAAAAAAIAgMQgAAAAAAAAAAAAAAACCxCAAAAAAAAAAAAAAAAAIEoMAAAAAAAAAAAAAAAAgSAwCAAAAAAAAAAAAAACAIDEIAAAAAAAAAAAAAAAAgsQgAAAAAAAAAAAAAAAACBKDAAAAAAAAAAAAAAAAIEgMAgAAAAAAAAAAAAAAgJptB3TNe7S7iZXHAAAAAElFTkSuQmCC" class="header-logo" alt="Logo">
            <div class="header-text">
                <h1>⚡ 五温区功率电阻计算系统</h1>
                <p>输入电压与电流，自动计算功率（KW）与电阻（mΩ）</p>
            </div>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-step active" data-page="0">一区</div>
            <div class="progress-step" data-page="1">二区</div>
            <div class="progress-step" data-page="2">三区</div>
            <div class="progress-step" data-page="3">四区</div>
            <div class="progress-step" data-page="4">五区</div>
            <div class="progress-step" data-page="5">汇总</div>
        </div>

        <div class="content">
            <!-- Formula hint -->
            <div class="formula-box">
                <strong>计算公式：</strong>
                平均电压 = (UAB + UBC + UAC) / 3 &nbsp;|&nbsp;
                平均电流 = (IA + IB + IC) / 3 &nbsp;|&nbsp;
                功率 <code>P = √3 × 平均电压 × 平均电流 / 1000</code> (KW) &nbsp;|&nbsp;
                电阻 <code>R = 平均电压 / 平均电流 × 1000</code> (mΩ)
            </div>

            <!-- Pages 1-5 -->
            <div id="pagesContainer"></div>

            <!-- Summary Page -->
            <div class="page" id="page-summary">
                <div class="zone-title">
                    <span style="font-size:28px;">📊</span>
                    <span>五温区数据汇总</span>
                </div>
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>温区</th>
                            <th>功率 P (KW)</th>
                            <th>电阻 R (mΩ)</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
                <div class="btn-group" style="margin-top:30px;">
                    <button class="btn btn-secondary" onclick="goToPage(4)">← 返回修改</button>
                    <button class="btn btn-primary" onclick="window.print()">🖨️ 打印报表</button>
                    <button class="btn btn-primary" onclick="resetAll()">🔄 重新开始</button>
                </div>
            </div>
        </div>
    </div>

<script>
const zones = ["一区", "二区", "三区", "四区", "五区"];
let currentPage = 0;
let data = Array(5).fill(null).map(() => ({
    uab: "", ubc: "", uac: "", ia: "", ib: "", ic: "",
    avgU: 0, avgI: 0, power: 0, resistance: 0
}));

function initPages() {
    const container = document.getElementById("pagesContainer");
    zones.forEach((zone, idx) => {
        const page = document.createElement("div");
        page.className = `page ${idx === 0 ? "active" : ""}`;
        page.id = `page-${idx}`;
        page.innerHTML = `
            <div class="zone-title">
                <div class="zone-badge">${idx+1}</div>
                <span>${zone}数据录入</span>
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>线电压 UAB</label>
                    <input type="number" step="0.001" id="uab-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">V</span>
                </div>
                <div class="input-group">
                    <label>线电压 UBC</label>
                    <input type="number" step="0.001" id="ubc-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">V</span>
                </div>
                <div class="input-group">
                    <label>线电压 UAC</label>
                    <input type="number" step="0.001" id="uac-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">V</span>
                </div>
                <div class="input-group">
                    <label>电流 IA</label>
                    <input type="number" step="0.001" id="ia-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">A</span>
                </div>
                <div class="input-group">
                    <label>电流 IB</label>
                    <input type="number" step="0.001" id="ib-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">A</span>
                </div>
                <div class="input-group">
                    <label>电流 IC</label>
                    <input type="number" step="0.001" id="ic-${idx}" placeholder="0.000" oninput="calculate(${idx})">
                    <span class="unit">A</span>
                </div>
            </div>
            <div class="results-panel">
                <div class="results-title">📈 实时计算结果</div>
                <div class="result-row">
                    <span class="result-label">平均电压</span>
                    <span class="result-value normal" id="avgU-${idx}">0.00000 V</span>
                </div>
                <div class="result-row">
                    <span class="result-label">平均电流</span>
                    <span class="result-value normal" id="avgI-${idx}">0.00000 A</span>
                </div>
                <div class="result-row">
                    <span class="result-label">功率 P</span>
                    <span class="result-value power" id="power-${idx}">0.00000 KW</span>
                </div>
                <div class="result-row">
                    <span class="result-label">电阻 R</span>
                    <span class="result-value resistance" id="resistance-${idx}">0.00000 mΩ</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" ${idx===0?"disabled":""} onclick="goToPage(${idx-1})">← 上一页</button>
                <button class="btn btn-primary" onclick="nextPage(${idx})">${idx===4?"查看汇总 →":"下一页 →"}</button>
            </div>
        `;
        container.appendChild(page);
    });
}

function calculate(idx) {
    const get = id => parseFloat(document.getElementById(id + "-" + idx).value) || 0;
    const d = data[idx];
    d.uab = get("uab"); d.ubc = get("ubc"); d.uac = get("uac");
    d.ia = get("ia"); d.ib = get("ib"); d.ic = get("ic");

    d.avgU = (d.uab + d.ubc + d.uac) / 3;
    d.avgI = (d.ia + d.ib + d.ic) / 3;

    if (d.avgI > 0) {
        d.power = (1.73205 * d.avgU * d.avgI / 1000);
        d.resistance = (d.avgU / d.avgI * 1000);
    } else {
        d.power = 0; d.resistance = 0;
    }

    document.getElementById(`avgU-${idx}`).textContent = d.avgU.toFixed(5) + " V";
    document.getElementById(`avgI-${idx}`).textContent = d.avgI.toFixed(5) + " A";
    document.getElementById(`power-${idx}`).textContent = d.power.toFixed(5) + " KW";
    document.getElementById(`resistance-${idx}`).textContent = d.resistance.toFixed(5) + " mΩ";
}

function goToPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    if (page === 5) {
        document.getElementById("page-summary").classList.add("active");
        renderSummary();
    } else {
        document.getElementById(`page-${page}`).classList.add("active");
    }

    document.querySelectorAll(".progress-step").forEach((step, idx) => {
        step.classList.remove("active", "completed");
        if (idx === page) step.classList.add("active");
        else if (idx < page) step.classList.add("completed");
    });
    currentPage = page;
}

function nextPage(idx) {
    if (idx === 4) {
        goToPage(5);
    } else {
        goToPage(idx + 1);
    }
}

function renderSummary() {
    const tbody = document.getElementById("summaryBody");
    let html = "";
    let totalPower = 0;
    zones.forEach((zone, idx) => {
        const d = data[idx];
        totalPower += d.power;
        html += `<tr>
            <td class="zone-name">${zone}</td>
            <td class="power-val">${d.power.toFixed(5)}</td>
            <td class="res-val">${d.resistance.toFixed(5)}</td>
        </tr>`;
    });
    html += `<tr class="total-row">
        <td>总功率</td>
        <td class="power-val" colspan="2">${totalPower.toFixed(5)} KW</td>
    </tr>`;
    tbody.innerHTML = html;
}

function resetAll() {
    if (!confirm("确定要清空所有数据重新开始吗？")) return;
    data = Array(5).fill(null).map(() => ({
        uab: "", ubc: "", uac: "", ia: "", ib: "", ic: "",
        avgU: 0, avgI: 0, power: 0, resistance: 0
    }));
    for (let i = 0; i < 5; i++) {
        ["uab","ubc","uac","ia","ib","ic"].forEach(id => {
            const el = document.getElementById(id + "-" + i);
            if (el) el.value = "";
        });
        calculate(i);
    }
    goToPage(0);
}

// Progress bar click navigation
document.getElementById("progressBar").addEventListener("click", e => {
    const step = e.target.closest(".progress-step");
    if (step) goToPage(parseInt(step.dataset.page));
});

initPages();
</script>
</body>
</html>
